name: NLPL CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint (markdown + workflow)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Markdownlint
        run: |
          npm install -g markdownlint-cli@0.39.0
          markdownlint README.md docs/**/*.md

      - name: Actionlint
        uses: docker://ghcr.io/rhysd/actionlint:1.6.27
        with:
          args: "-color"

  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]
    continue-on-error: ${{ matrix.python-version == '3.14-dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-rerunfailures

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --maxfail=1 --disable-warnings \
            --cov=src/nlpl --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term --cov-fail-under=75 --timeout=30 \
            --junitxml=junit-${{ matrix.python-version }}.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-${{ matrix.python-version }}.xml
          retention-days: 14

      - name: Upload junit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: junit-${{ matrix.python-version }}.xml
          retention-days: 14

  lsp-smoke:
    name: LSP smoke (py3.11)
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LSP smoke
        run: |
          python scripts/ci_lsp_smoke.py \
            --sample examples/01_basic_concepts.nlpl \
            --max-latency-ms 500 \
            --output lsp-smoke.json

      - name: Upload LSP smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-smoke
          path: lsp-smoke.json
          retention-days: 14

  perf-smoke:
    name: Perf smoke (py3.11)
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run perf smoke
        run: |
          python scripts/ci_perf_smoke.py \
            --sample examples/01_basic_concepts.nlpl \
            --sample examples/24_struct_and_union.nlpl \
            --threshold-ms 1500 \
            --output perf-smoke.json

      - name: Upload perf smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke
          path: perf-smoke.json
          retention-days: 14

  macos-weekly:
    name: MacOS weekly sanity
    if: github.event_name == 'schedule'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke tests
        run: |
          pytest tests/ -q --maxfail=1 --disable-warnings --timeout=30
