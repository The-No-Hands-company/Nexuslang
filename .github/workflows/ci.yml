name: NLPL CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Job 1: Static Code Analysis
  analyze:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run static analyzer on examples
        id: analyze_examples
        run: |
          ./nlpl-analyze examples/*.nlpl --json analysis_examples.json || true
          
      - name: Run static analyzer on test programs
        id: analyze_tests
        run: |
          ./nlpl-analyze test_programs/unit/basic/*.nlpl --json analysis_tests.json || true
      
      - name: Check for critical errors
        run: |
          python -c "
          import json
          import sys
          
          def check_file(filename):
              try:
                  with open(filename) as f:
                      issues = json.load(f)
                  errors = [i for i in issues if i.get('severity') == 'ERROR']
                  return errors
              except FileNotFoundError:
                  return []
          
          errors_examples = check_file('analysis_examples.json')
          errors_tests = check_file('analysis_tests.json')
          
          total_errors = len(errors_examples) + len(errors_tests)
          
          if total_errors > 0:
              print(f'Found {total_errors} critical errors')
              print('Examples:', len(errors_examples))
              print('Tests:', len(errors_tests))
              # Don't fail on errors in examples (they may be intentional)
              # Only fail on test errors
              if len(errors_tests) > 5:  # Allow some test errors
                  sys.exit(1)
          else:
              print('No critical errors found')
          "
      
      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-results
          path: |
            analysis_examples.json
            analysis_tests.json
          retention-days: 30
  
  # Job 2: Code Formatting Check
  format-check:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check examples formatting
        id: format_examples
        run: |
          ./nlpl-format --check examples/*.nlpl || echo "Examples need formatting"
      
      - name: Check test programs formatting
        id: format_tests
        run: |
          ./nlpl-format --check test_programs/unit/basic/*.nlpl || echo "Tests need formatting"
      
      - name: Generate formatting report
        if: failure()
        run: |
          echo "Some files need formatting. Run './nlpl-format -i <files>' to fix."
          echo "This is informational only and does not fail the build."
  
  # Job 3: Test Suite
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist
      
      - name: Run pytest
        run: |
          pytest tests/ -v --cov=src/nlpl --cov-report=xml --cov-report=term -n auto
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Run interpreter tests
        run: |
          # Test basic interpreter functionality
          python src/nlpl/main.py test_programs/unit/basic/test_hello_world.nlpl || true
          python src/nlpl/main.py test_programs/unit/basic/test_variables.nlpl || true
  
  # Job 4: Compiler Benchmarks
  benchmark:
    name: Compiler Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
      
      - name: Run integration tests
        if: hashFiles('integration_tests.py') != ''
        run: |
          python integration_tests.py
      
      - name: Run benchmark suite
        if: hashFiles('benchmarks/benchmark_performance.py') != ''
        run: |
          cd benchmarks
          python benchmark_performance.py || echo "Benchmarks failed (non-critical)"
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            benchmark_*.txt
            benchmark_*.json
          retention-days: 90
  
  # Job 5: Build and Deploy Documentation
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Verify documentation structure
        run: |
          echo "Documentation files:"
          find docs/ -name "*.md" | sort
          echo ""
          echo "Root documentation:"
          ls -la *.md || true
      
      - name: Check for broken links (if markdown-link-check installed)
        run: |
          npx markdown-link-check README.md || echo "Link check skipped"
  
  # Job 6: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit security scan
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ || true
      
      - name: Check dependencies for vulnerabilities
        run: |
          safety check || echo "Safety check completed with findings"
      
      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: bandit-report.json
          retention-days: 30

  # Job 7: Summary Report
  report:
    name: Generate CI Summary
    runs-on: ubuntu-latest
    needs: [analyze, format-check, test]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Generate summary
        run: |
          echo "# NLPL CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Static Analysis: ${{ needs.analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Format Check: ${{ needs.format-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Static analysis results available for 30 days" >> $GITHUB_STEP_SUMMARY
          echo "- Test coverage reports uploaded to Codecov" >> $GITHUB_STEP_SUMMARY
