name: Delete branch conflict_310326_2342

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete branch conflict_310326_2342
        run: |
          BRANCH="conflict_310326_2342"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/${BRANCH}")
          if [ "$STATUS" = "200" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/${BRANCH}"
            echo "Branch '${BRANCH}' deleted successfully."
          else
            echo "Branch '${BRANCH}' does not exist or already deleted (HTTP ${STATUS})."
          fi
