coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,components,footer"
  behavior: default
  require_changes: true

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 80%
      - type: patch
        target: 70%

flags:
  parser:
    paths:
      - src/nlpl/parser/
    carryforward: true
  interpreter:
    paths:
      - src/nlpl/interpreter/
    carryforward: true
  stdlib:
    paths:
      - src/nlpl/stdlib/
    carryforward: true
  typesystem:
    paths:
      - src/nlpl/typesystem/
    carryforward: true
  runtime:
    paths:
      - src/nlpl/runtime/
    carryforward: true

component_management:
  individual_components:
    - component_id: parser
      name: "Parser & Lexer"
      paths:
        - src/nlpl/parser/
    - component_id: interpreter
      name: "Interpreter"
      paths:
        - src/nlpl/interpreter/
    - component_id: stdlib
      name: "Standard Library"
      paths:
        - src/nlpl/stdlib/
    - component_id: typesystem
      name: "Type System"
      paths:
        - src/nlpl/typesystem/
    - component_id: runtime
      name: "Runtime"
      paths:
        - src/nlpl/runtime/
    - component_id: errors
      name: "Error Handling"
      paths:
        - src/nlpl/errors.py
