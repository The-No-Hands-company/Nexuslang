# Example NLPL Project Manifest
# This demonstrates a complete nlpl.toml configuration

[package]
name = "example-game"
version = "0.1.0"
authors = ["Game Developer <dev@example.com>"]
license = "MIT"
description = "An example game using NLPL graphics libraries"
repository = "https://github.com/user/example-game"
keywords = ["game", "graphics", "3d"]
edition = "2026"
build = "build.nlpl"  # Custom build script

# Runtime dependencies
[dependencies]
nlpl-math = "1.0"
nlpl-graphics = { version = "2.0", features = ["opengl", "vulkan"] }
nlpl-audio = "0.5"

# Development dependencies (testing, benchmarking)
[dev-dependencies]
nlpl-test = "1.0"
nlpl-bench = "0.3"

# Build script dependencies
[build-dependencies]
nlpl-build-tools = "0.2"

# Binary targets
[[bin]]
name = "game"
path = "src/main.nlpl"

[[bin]]
name = "editor"
path = "src/bin/editor.nlpl"
required-features = ["editor-mode"]

# Library target (if this package is also a library)
[lib]
name = "example_game_lib"
path = "src/lib.nlpl"
crate-type = ["lib"]

# Build profiles
[profile.dev]
opt-level = 0
debug = true
incremental = true

[profile.release]
opt-level = 3
lto = true
strip = true
panic = "abort"

[profile.production]
inherits = "release"
codegen-units = 1  # Maximum optimization

# Feature flags
[features]
default = ["graphics-basic"]
graphics-basic = []
graphics-advanced = ["nlpl-graphics/advanced"]
editor-mode = ["dep:nlpl-editor"]
experimental = []

# Platform-specific dependencies
[target.'cfg(unix)'.dependencies]
nlpl-unix-utils = "0.1"

[target.'cfg(windows)'.dependencies]
nlpl-windows-api = "0.2"
